<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#1b262c"/>
  <circle cx="100" cy="100" r="95" fill="#3282b8" opacity="0.15"/>
  
  <!-- Subtle Angel Wings in background -->
  <path d="M 50 140 Q 20 80 50 50 Q 70 80 75 120 Z" fill="#ffffff" opacity="0.08"/>
  <path d="M 150 140 Q 180 80 150 50 Q 130 80 125 120 Z" fill="#ffffff" opacity="0.08"/>

  <!-- Body/Jacket -->
  <path d="M 55 200 L 68 150 L 132 150 L 145 200 Z" fill="#0f171e"/>
  <!-- Shirt collar -->
  <path d="M 85 150 L 100 168 L 115 150 Z" fill="#111111"/>

  <!-- Neck -->
  <rect x="91" y="125" width="18" height="25" fill="#5c3a21"/>
  
  <!-- Head (Smooth shaved head shape) -->
  <path d="M 74 110 C 68 82 75 62 100 62 C 125 62 132 82 126 110 C 122 126 114 130 100 130 C 86 130 78 126 74 110 Z" fill="#5c3a21"/>
  
  <!-- Eyes (Dark, calm/wise) -->
  <ellipse cx="86" cy="95" rx="7.5" ry="4.5" fill="#111"/>
  <ellipse cx="114" cy="95" rx="7.5" ry="4.5" fill="#111"/>
  <circle cx="86" cy="95" r="4" fill="#3a2110"/>
  <circle cx="114" cy="95" r="4" fill="#3a2110"/>
  <circle cx="85" cy="93" r="1.5" fill="#fff"/>
  <circle cx="113" cy="93" r="1.5" fill="#fff"/>
  
  <!-- Nose (Strong, defined) -->
  <path d="M 100 90 L 97 108 L 103 108" fill="none" stroke="#3a2110" stroke-width="1.5"/>

  <!-- Smile/Lip line -->
  <path d="M 88 120 Q 100 126 112 120" stroke="#3a2110" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Neat goatee/beard -->
  <path d="M 78 112 Q 78 128 100 133 Q 122 128 122 112 L 125 112 Q 124 132 100 136 Q 76 132 75 112 Z" fill="#111111"/>
  <path d="M 86 117 Q 100 121 114 117 L 110 119 Q 100 123 90 119 Z" fill="#111111"/>
</svg>
