  <circle cx="62" cy="115" r="9" fill="#f6d3b4"/>
  <circle cx="138" cy="115" r="9" fill="#f6d3b4"/>
  <!-- Head (Large, typical Big Mouth shape, narrow chin) -->
  <path d="M 70 115 C 65 75 75 60 100 60 C 125 60 135 75 130 115 C 128 135 118 140 100 140 C 82 140 72 135 70 115 Z" fill="#f6d3b4"/>
  <!-- Big Mouth Eyes -->
  <ellipse cx="85" cy="98" rx="13" ry="15" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <ellipse cx="115" cy="98" rx="13" ry="15" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <circle cx="85" cy="98" r="4.5" fill="#333333"/>
  <circle cx="115" cy="98" r="4.5" fill="#333333"/>
  <!-- Glasses -->
  <circle cx="85" cy="98" r="17" fill="none" stroke="#111111" stroke-width="4"/>
  <circle cx="115" cy="98" r="17" fill="none" stroke="#111111" stroke-width="4"/>
  <line x1="102" y1="98" x2="114" y2="98" stroke="#111111" stroke-width="4"/>
  <path d="M 68 98 L 58 96" stroke="#111111" stroke-width="3"/>
  <path d="M 132 98 L 142 96" stroke="#111111" stroke-width="3"/>
  <!-- Nose (Geeky narrow line) -->
  <path d="M 100 95 L 100 112 Q 100 115 104 114" stroke="#d35400" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Mouth (Uncomfortable smirk, buck teeth showing) -->
  <path d="M 88 126 Q 100 132 112 126" stroke="#333333" stroke-width="2" fill="none"/>
  <rect x="97" y="127" width="3" height="4" fill="#ffffff" stroke="#333333" stroke-width="0.75"/>
  <rect x="100" y="127" width="3" height="4" fill="#ffffff" stroke="#333333" stroke-width="0.75"/>
  <!-- Messy Brown Hair -->
  <path d="M 66 82 C 60 70 65 50 78 45 C 90 40 100 48 105 45 C 112 42 122 45 128 52 C 135 60 135 72 134 82 C 140 75 140 65 130 55 C 125 40 110 35 95 38 C 80 35 68 45 66 65 Q 63 75 66 82 Z" fill="#6f4e37"/>
