<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#f39c12"/>
  <circle cx="100" cy="100" r="90" fill="#f5b041" opacity="0.3"/>
  <!-- Body/Clothes -->
  <path d="M 60 200 L 70 150 L 130 150 L 140 200 Z" fill="#2c82c9"/>
  <path d="M 90 150 L 100 165 L 110 150 Z" fill="#e5c298"/>
  <!-- Neck -->
  <rect x="90" y="125" width="20" height="30" fill="#e5c298"/>
  <!-- Head -->
  <ellipse cx="100" cy="95" rx="35" ry="40" fill="#f0d2b4"/>
  <!-- Eyes -->
  <circle cx="85" cy="90" r="10" fill="#ffffff"/>
  <circle cx="115" cy="90" r="10" fill="#ffffff"/>
  <circle cx="85" cy="90" r="4" fill="#333333"/>
  <circle cx="115" cy="90" r="4" fill="#333333"/>
  <!-- Nose (Matt Groening style) -->
  <path d="M 100 88 Q 106 95 100 102" stroke="#d5b290" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Mouth & Buck Teeth -->
  <path d="M 90 120 Q 100 125 110 120" stroke="#333333" stroke-width="2" fill="none"/>
  <rect x="96" y="121" width="4" height="6" fill="#ffffff" stroke="#333333" stroke-width="1"/>
  <rect x="100" y="121" width="4" height="6" fill="#ffffff" stroke="#333333" stroke-width="1"/>
  <!-- Hair (White, messy, parted) -->
  <path d="M 60 90 Q 55 60 75 50 Q 100 40 125 50 Q 145 60 140 90 Q 145 130 140 160 L 130 160 Q 135 110 130 90 Q 100 70 70 90 Q 65 110 60 160 L 50 160 Q 55 130 60 90 Z" fill="#ffffff"/>
  <path d="M 95 43 L 105 70" stroke="#e0e0e0" stroke-width="2"/>
  <!-- Freckles -->
  <circle cx="75" cy="108" r="1.5" fill="#d5b290"/>
  <circle cx="79" cy="111" r="1.5" fill="#d5b290"/>
  <circle cx="121" cy="108" r="1.5" fill="#d5b290"/>
  <circle cx="125" cy="111" r="1.5" fill="#d5b290"/>
</svg>
