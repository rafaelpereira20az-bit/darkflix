<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0b2840"/>
  <circle cx="100" cy="100" r="95" fill="#0984e3" opacity="0.15"/>
  <!-- Body/Enforcer Uniform -->
  <path d="M 55 200 L 68 150 L 132 150 L 145 200 Z" fill="#1e272e"/>
  <!-- Gold trim / epaulets -->
  <path d="M 68 155 Q 75 150 82 165" stroke="#f1c40f" stroke-width="4" fill="none"/>
  <path d="M 132 155 Q 125 150 118 165" stroke="#f1c40f" stroke-width="4" fill="none"/>
  <!-- Neck -->
  <rect x="90" y="125" width="20" height="25" fill="#edd9d2"/>
  <!-- Head -->
  <path d="M 72 110 C 65 78 75 62 100 62 C 125 62 135 78 128 110 C 124 128 118 132 100 132 C 82 132 76 128 72 110 Z" fill="#edd9d2"/>
  
  <!-- Eyes (Purple/Violet, calm/focused) -->
  <ellipse cx="86" cy="94" rx="8" ry="5.5" fill="#111"/>
  <ellipse cx="114" cy="94" rx="8" ry="5.5" fill="#111"/>
  <circle cx="86" cy="94" r="4.5" fill="#9b59b6"/>
  <circle cx="114" cy="94" r="4.5" fill="#9b59b6"/>
  <circle cx="85" cy="92" r="1.5" fill="#fff"/>
  <circle cx="113" cy="92" r="1.5" fill="#fff"/>
  
  <!-- Nose (Slim, elegant) -->
  <path d="M 100 90 L 98 106 L 103 106" fill="none" stroke="#d7a492" stroke-width="1.5"/>

  <!-- Lip line -->
  <path d="M 88 118 Q 100 123 112 118" stroke="#b33939" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Dark hair underneath hat -->
  <path d="M 70 85 Q 50 110 50 170 L 62 170 Q 60 110 70 85 Z" fill="#2c3e50"/>
  <path d="M 130 85 Q 150 110 150 170 L 138 170 Q 140 110 130 85 Z" fill="#2c3e50"/>
  <!-- Hair bangs framing face -->
  <path d="M 72 70 Q 64 90 68 115" stroke="#2c3e50" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 128 70 Q 136 90 132 115" stroke="#2c3e50" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Enforcer Cap/Hat -->
  <path d="M 64 68 C 64 45 75 40 100 40 C 125 40 136 45 136 68 Z" fill="#2c3e50"/>
  <!-- Visor -->
  <path d="M 60 68 Q 100 78 140 68 L 135 60 Q 100 68 65 60 Z" fill="#1e272e" stroke="#111" stroke-width="1"/>
  <!-- Gold badge on hat -->
  <path d="M 95 50 L 100 42 L 105 50 L 100 58 Z" fill="#f1c40f"/>
</svg>
