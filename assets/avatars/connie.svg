<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#9b59b6"/>
  <circle cx="100" cy="100" r="90" fill="#e8daef" opacity="0.3"/>
  <!-- wild orange/red hair background -->
  <path d="M 50 160 Q 30 110 50 60 Q 100 20 150 60 Q 170 110 150 160 Z" fill="#d35400"/>
  <!-- Horns (Yellow/Gold) -->
  <path d="M 75 55 Q 60 20 75 10 Q 90 20 85 50 Z" fill="#f1c40f" stroke="#d4ac0d" stroke-width="1.5"/>
  <path d="M 125 55 Q 140 20 125 10 Q 110 20 115 50 Z" fill="#f1c40f" stroke="#d4ac0d" stroke-width="1.5"/>
  <!-- Body (Orange fur) -->
  <path d="M 60 200 L 70 150 L 130 150 L 140 200 Z" fill="#e67e22"/>
  <path d="M 90 150 L 100 165 L 110 150 Z" fill="#d35400"/>
  <!-- Neck -->
  <rect x="90" y="125" width="20" height="30" fill="#e67e22"/>
  <!-- Head (Hormone Monstress Shape) -->
  <path d="M 72 110 C 65 75 75 65 100 65 C 125 65 135 75 128 110 C 125 128 118 135 100 135 C 82 135 75 128 72 110 Z" fill="#e67e22"/>
  <!-- Big Eyes (Green iris, purple eyelids) -->
  <circle cx="85" cy="92" r="14" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <circle cx="115" cy="92" r="14" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <!-- Purple Eyelids (heavy/seductive) -->
  <path d="M 70 85 Q 85 70 100 85 Z" fill="#8e44ad"/>
  <path d="M 100 85 Q 115 70 130 85 Z" fill="#8e44ad"/>
  <!-- Irises & Pupils -->
  <circle cx="85" cy="92" r="7" fill="#2ecc71"/>
  <circle cx="115" cy="92" r="7" fill="#2ecc71"/>
  <circle cx="85" cy="92" r="3.5" fill="#111111"/>
  <circle cx="115" cy="92" r="3.5" fill="#111111"/>
  <!-- Eyelashes -->
  <path d="M 72 82 L 64 78 M 76 80 L 70 72 M 128 82 L 136 78 M 124 80 L 130 72" stroke="#333333" stroke-width="2" stroke-linecap="round"/>
  <!-- Nose (Feline/Monster pink nose) -->
  <polygon points="94,102 106,102 100,108" fill="#fd79a8" stroke="#333333" stroke-width="1"/>
  <!-- Huge Seductive Mouth (Red Lips, white teeth) -->
  <path d="M 78 118 Q 100 132 122 118 Q 100 114 78 118 Z" fill="#e74c3c" stroke="#333333" stroke-width="1.5"/>
  <path d="M 85 118 L 115 118 Q 100 126 85 118" fill="#ffffff"/>
  <line x1="100" y1="118" x2="100" y2="124" stroke="#333333" stroke-width="1"/>
</svg>
