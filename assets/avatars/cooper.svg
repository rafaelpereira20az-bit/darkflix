<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Dark teal/space background -->
  <rect width="200" height="200" fill="#0d2137"/>
  <radialGradient id="starbg" cx="30%" cy="20%" r="70%">
    <stop offset="0%" stop-color="#1a4060" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#050e18"/>
  </radialGradient>
  <rect width="200" height="200" fill="url(#starbg)"/>
  <!-- Stars -->
  <circle cx="20" cy="15" r="1" fill="white" opacity="0.8"/>
  <circle cx="55" cy="25" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="170" cy="10" r="1" fill="white" opacity="0.9"/>
  <circle cx="185" cy="40" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="10" cy="60" r="1" fill="white" opacity="0.7"/>
  <circle cx="180" cy="80" r="1" fill="white" opacity="0.6"/>
  <circle cx="165" cy="35" r="1" fill="white" opacity="0.8"/>
  <circle cx="30" cy="50" r="1" fill="white" opacity="0.5"/>

  <!-- Spacesuit body -->
  <path d="M 40 200 L 48 160 Q 55 148 100 146 Q 145 148 152 160 L 160 200 Z" fill="#c8c0b0"/>
  <!-- Suit texture -->
  <path d="M 75 155 L 75 200" stroke="#a8a098" stroke-width="2"/>
  <path d="M 125 155 L 125 200" stroke="#a8a098" stroke-width="2"/>
  <path d="M 50 175 L 150 175" stroke="#a8a098" stroke-width="1.5" opacity="0.6"/>
  <!-- Suit collar ring -->
  <ellipse cx="100" cy="148" rx="48" ry="14" fill="#d8d0c0"/>
  <ellipse cx="100" cy="148" rx="44" ry="10" fill="#c0b8a8"/>
  <!-- Suit chest emblem/NASA patch area -->
  <rect x="80" y="163" width="40" height="24" rx="4" fill="#1a3a5c"/>
  <rect x="83" y="166" width="34" height="18" rx="3" fill="#0d2340"/>
  <!-- Emblem lines -->
  <circle cx="100" cy="175" r="7" fill="none" stroke="#4a8ac8" stroke-width="1.5"/>
  <line x1="93" y1="175" x2="107" y2="175" stroke="#4a8ac8" stroke-width="1"/>
  <line x1="100" y1="168" x2="100" y2="182" stroke="#4a8ac8" stroke-width="1"/>

  <!-- Neck -->
  <rect x="86" y="130" width="28" height="20" rx="5" fill="#d8c4a8"/>

  <!-- Head -->
  <ellipse cx="100" cy="100" rx="40" ry="44" fill="#d8c4a8"/>

  <!-- Hair - short, slightly messy, brownish -->
  <ellipse cx="100" cy="63" rx="40" ry="22" fill="#5a3e28"/>
  <path d="M 60 78 Q 56 85 58 95" stroke="#5a3e28" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 140 78 Q 144 85 142 95" stroke="#5a3e28" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Hair strands -->
  <path d="M 80 44 Q 82 55 80 68" stroke="#6a4e38" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 90 42 Q 88 54 90 66" stroke="#6a4e38" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 110 44 Q 112 55 110 68" stroke="#6a4e38" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Eyebrows - furrowed, determined -->
  <path d="M 70 85 Q 82 80 94 85" stroke="#4a3018" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 106 85 Q 118 80 130 85" stroke="#4a3018" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes - intense, tired -->
  <ellipse cx="82" cy="97" rx="11" ry="9" fill="white"/>
  <ellipse cx="118" cy="97" rx="11" ry="9" fill="white"/>
  <ellipse cx="82" cy="97" rx="8" ry="8" fill="#5a7838"/>
  <ellipse cx="118" cy="97" rx="8" ry="8" fill="#5a7838"/>
  <ellipse cx="82" cy="97" rx="5" ry="5" fill="#1a1a1a"/>
  <ellipse cx="118" cy="97" rx="5" ry="5" fill="#1a1a1a"/>
  <ellipse cx="84" cy="95" rx="2" ry="1.5" fill="white"/>
  <ellipse cx="120" cy="95" rx="2" ry="1.5" fill="white"/>
  <!-- Eye wrinkles/tired lines -->
  <path d="M 71 90 L 73 87" stroke="#b89870" stroke-width="1" opacity="0.5"/>
  <path d="M 129 90 L 127 87" stroke="#b89870" stroke-width="1" opacity="0.5"/>

  <!-- Nose - strong, prominent -->
  <path d="M 98 108 L 93 120 Q 100 125 107 120 L 102 108" fill="#c8a888" opacity="0.7"/>
  <ellipse cx="93" cy="119" rx="5" ry="4" fill="#b8987A"/>
  <ellipse cx="107" cy="119" rx="5" ry="4" fill="#b8987A"/>

  <!-- Mouth - determined set jaw -->
  <path d="M 84 132 Q 100 135 116 132" stroke="#9a7060" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Stubble/beard -->
  <ellipse cx="100" cy="130" rx="22" ry="12" fill="#a08060" opacity="0.2"/>
  <!-- Stubble dots -->
  <circle cx="86" cy="128" r="1" fill="#8a6040" opacity="0.5"/>
  <circle cx="90" cy="132" r="1" fill="#8a6040" opacity="0.5"/>
  <circle cx="94" cy="128" r="1" fill="#8a6040" opacity="0.5"/>
  <circle cx="106" cy="128" r="1" fill="#8a6040" opacity="0.5"/>
  <circle cx="110" cy="132" r="1" fill="#8a6040" opacity="0.5"/>
  <circle cx="114" cy="128" r="1" fill="#8a6040" opacity="0.5"/>

  <!-- Ears -->
  <ellipse cx="60" cy="100" rx="7" ry="10" fill="#d8c4a8"/>
  <ellipse cx="140" cy="100" rx="7" ry="10" fill="#d8c4a8"/>
</svg>
