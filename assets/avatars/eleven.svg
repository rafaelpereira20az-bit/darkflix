<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Dark red/teal Stranger Things inspired background -->
  <rect width="200" height="200" fill="#0a0d1a"/>
  <radialGradient id="stbg" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#1a0d2a"/>
    <stop offset="100%" stop-color="#030508"/>
  </radialGradient>
  <rect width="200" height="200" fill="url(#stbg)"/>
  <!-- Particle lights - the Upside Down ambiance -->
  <circle cx="25" cy="30" r="2" fill="#ff4444" opacity="0.7"/>
  <circle cx="170" cy="20" r="1.5" fill="#ff6633" opacity="0.5"/>
  <circle cx="40" cy="170" r="1.5" fill="#ff2200" opacity="0.4"/>
  <circle cx="165" cy="155" r="2" fill="#ff3333" opacity="0.6"/>
  <circle cx="155" cy="40" r="1.5" fill="#ff5544" opacity="0.5"/>
  <circle cx="20" cy="100" r="1" fill="#ff4400" opacity="0.4"/>
  <!-- Red vignette from the Upside Down -->
  <radialGradient id="redvig" cx="50%" cy="100%" r="70%">
    <stop offset="0%" stop-color="#330000" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <rect width="200" height="200" fill="url(#redvig)"/>

  <!-- Body - denim jacket + pink dress -->
  <path d="M 35 200 L 46 155 Q 56 140 100 138 Q 144 140 154 155 L 165 200 Z" fill="#6a8aaa"/>
  <!-- Denim jacket texture -->
  <path d="M 56 155 Q 58 145 70 142" stroke="#5a7a9a" stroke-width="2" fill="none"/>
  <path d="M 144 155 Q 142 145 130 142" stroke="#5a7a9a" stroke-width="2" fill="none"/>
  <!-- Jacket collar/lapels -->
  <path d="M 86 148 L 94 140 L 100 155 L 106 140 L 114 148 Q 100 158 86 148 Z" fill="#5a7a9a"/>
  <!-- Pink dress underneath -->
  <path d="M 88 155 Q 100 162 112 155 L 112 200 L 88 200 Z" fill="#e8a0b0"/>
  <!-- Jacket stitching details -->
  <line x1="60" y1="155" x2="60" y2="200" stroke="#4a6a8a" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="140" y1="155" x2="140" y2="200" stroke="#4a6a8a" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- Neck -->
  <rect x="88" y="128" width="24" height="16" rx="5" fill="#e8c8b8"/>

  <!-- Head - young, round face -->
  <ellipse cx="100" cy="98" rx="38" ry="42" fill="#e8c8b8"/>

  <!-- Very short/shaved hair - Eleven's signature look -->
  <ellipse cx="100" cy="64" rx="38" ry="20" fill="#2a2018"/>
  <!-- Short stubble texture -->
  <ellipse cx="100" cy="60" rx="36" ry="16" fill="#3a3028" opacity="0.7"/>
  <!-- Subtle hair grain -->
  <ellipse cx="80" cy="62" rx="10" ry="6" fill="#4a4038" opacity="0.4"/>
  <ellipse cx="120" cy="62" rx="10" ry="6" fill="#4a4038" opacity="0.4"/>
  <!-- Side hair -->
  <path d="M 62 75 Q 58 85 60 95" stroke="#2a2018" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M 138 75 Q 142 85 140 95" stroke="#2a2018" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- Eyebrows - strong, slightly furrowed -->
  <path d="M 70 88 Q 83 82 96 88" stroke="#3a2818" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 104 88 Q 117 82 130 88" stroke="#3a2818" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes - large, intense brown -->
  <ellipse cx="83" cy="100" rx="13" ry="11" fill="white"/>
  <ellipse cx="117" cy="100" rx="13" ry="11" fill="white"/>
  <ellipse cx="83" cy="100" rx="10" ry="10" fill="#6a4020"/>
  <ellipse cx="117" cy="100" rx="10" ry="10" fill="#6a4020"/>
  <ellipse cx="83" cy="100" rx="7" ry="7" fill="#3a2010"/>
  <ellipse cx="117" cy="100" rx="7" ry="7" fill="#3a2010"/>
  <ellipse cx="83" cy="100" rx="4" ry="4" fill="#080808"/>
  <ellipse cx="117" cy="100" rx="4" ry="4" fill="#080808"/>
  <ellipse cx="85" cy="97" rx="2.5" ry="2" fill="white" opacity="0.95"/>
  <ellipse cx="119" cy="97" rx="2.5" ry="2" fill="white" opacity="0.95"/>

  <!-- NOSEBLEED - Eleven's psychic power signature -->
  <!-- Nose -->
  <path d="M 97 110 L 92 122 Q 100 126 108 122 L 103 110" fill="#d8b098" opacity="0.7"/>
  <ellipse cx="92" cy="121" rx="4" ry="3.5" fill="#c8a088"/>
  <ellipse cx="108" cy="121" rx="4" ry="3.5" fill="#c8a088"/>
  <!-- Blood drops from nose -->
  <path d="M 100 122 Q 100 130 101 136 Q 100 140 100 145" stroke="#cc0000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="100" cy="145" rx="3" ry="4" fill="#cc0000"/>
  <ellipse cx="101" cy="132" rx="2" ry="2.5" fill="#dd1111"/>

  <!-- Mouth - slightly parted, focused -->
  <path d="M 88 133 Q 100 136 112 133" stroke="#b08070" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 92 133 Q 100 135 108 133 Q 106 138 100 139 Q 94 138 92 133 Z" fill="#e0a898" opacity="0.5"/>

  <!-- Ears -->
  <ellipse cx="62" cy="100" rx="7" ry="10" fill="#e8c8b8"/>
  <ellipse cx="138" cy="100" rx="7" ry="10" fill="#e8c8b8"/>
</svg>
