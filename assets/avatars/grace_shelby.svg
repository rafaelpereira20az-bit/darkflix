    <stop offset="0%" stop-color="#5e4838"/>
    <stop offset="100%" stop-color="#241910"/>
  </radialGradient>
  <rect width="200" height="200" fill="url(#gold-smoke)"/>
  
  <!-- Fur-trimmed coat collar -->
  <path d="M 50 200 L 68 150 L 132 150 L 150 200 Z" fill="#2d3436"/>
