  <ellipse cx="114" cy="95" rx="7" ry="4.5" fill="#111"/>
  <circle cx="86" cy="95" r="3.5" fill="#3498db"/>
  <circle cx="114" cy="95" r="3.5" fill="#3498db"/>
  <circle cx="85" cy="93" r="1" fill="#fff"/>
  <circle cx="113" cy="93" r="1" fill="#fff"/>
  
  <!-- Nose (Delicate) -->
  <path d="M 100 90 L 98 108 L 102 108" fill="none" stroke="#d5b290" stroke-width="1.5"/>

  <!-- Red Lipstick Lip line -->
  <path d="M 88 120 Q 100 128 112 120" stroke="#c0392b" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Blonde 1920s Wavy Hair -->
  <!-- Left waves -->
