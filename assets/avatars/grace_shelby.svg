  <circle cx="138" cy="85" r="10" fill="#f1c40f"/>
  <circle cx="142" cy="105" r="10" fill="#f1c40f"/>
  
  <!-- Top hair volume -->
  <path d="M 70 70 Q 100 50 130 70 L 124 60 Q 100 48 76 60 Z" fill="#f1c40f"/>
  <!-- Gold highlights -->
