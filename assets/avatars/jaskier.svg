  <!-- Happy Smile -->
  <path d="M 86 118 Q 100 126 114 118" stroke="#7e2a1f" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Medium Shoulder-Length Brown Hair -->
  <path d="M 70 70 Q 52 75 56 120 L 68 115 Q 64 85 72 70 Z" fill="#6f4e37"/>
  <path d="M 130 70 Q 148 75 144 120 L 132 115 Q 136 85 128 70 Z" fill="#6f4e37"/>
  <path d="M 70 70 Q 100 50 130 70 L 126 62 Q 100 54 74 62 Z" fill="#6f4e37"/>
