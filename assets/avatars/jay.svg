<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#3498db"/>
  <circle cx="100" cy="100" r="90" fill="#aed6f1" opacity="0.3"/>
  <!-- Body/Clothes -->
  <path d="M 60 200 L 70 160 L 130 160 L 140 200 Z" fill="#34495e"/>
  <!-- Tank Top neck -->
  <path d="M 85 160 Q 100 178 115 160 Z" fill="#e5c298"/>
  <!-- Neck -->
  <rect x="91" y="130" width="18" height="30" fill="#e5c298"/>
  <!-- Ears -->
  <circle cx="62" cy="115" r="9" fill="#e5c298"/>
  <circle cx="138" cy="115" r="9" fill="#e5c298"/>
  <!-- Head -->
  <path d="M 70 115 C 65 75 75 62 100 62 C 125 62 135 75 130 115 C 128 132 118 138 100 138 C 82 138 72 132 70 115 Z" fill="#e5c298"/>
  <!-- Big Eyes -->
  <ellipse cx="85" cy="95" rx="13" ry="15" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <ellipse cx="115" cy="95" rx="13" ry="15" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <circle cx="85" cy="95" r="4.5" fill="#333333"/>
  <circle cx="115" cy="95" r="4.5" fill="#333333"/>
  <!-- Heavy black eyebrows (Jay's key feature) -->
  <path d="M 68 76 Q 85 68 98 78" stroke="#111111" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 132 76 Q 115 68 102 78" stroke="#111111" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Nose (Triangular shape) -->
  <path d="M 100 95 L 96 110 L 104 110 Z" fill="#c09d7e"/>
  <!-- Smug/Confident Mouth -->
  <path d="M 85 120 Q 100 132 115 120" stroke="#333333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Spiky Black Hair -->
  <path d="M 62 70 Q 50 35 72 40 Q 82 20 95 38 Q 110 15 122 38 Q 145 30 134 70 L 138 55 Q 100 45 62 55 Z" fill="#111111"/>
</svg>
