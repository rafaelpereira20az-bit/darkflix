<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#e74c3c"/>
  <circle cx="100" cy="100" r="90" fill="#fadbd8" opacity="0.3"/>
  <!-- Hairy outline back -->
  <circle cx="100" cy="95" r="45" fill="#5d4037"/>
  <!-- Horns -->
  <path d="M 80 50 Q 72 25 80 18 Q 88 25 86 50 Z" fill="#b2b2b2" stroke="#7f7f7f" stroke-width="1"/>
  <path d="M 120 50 Q 128 25 120 18 Q 112 25 114 50 Z" fill="#b2b2b2" stroke="#7f7f7f" stroke-width="1"/>
  <!-- Body (Brown fur) -->
  <path d="M 55 200 L 65 145 L 135 145 L 145 200 Z" fill="#5d4037"/>
  <!-- Neck -->
  <rect x="88" y="120" width="24" height="30" fill="#5d4037"/>
  <!-- Head (Furry brow) -->
  <path d="M 70 110 C 62 75 75 60 100 60 C 125 60 138 75 130 110 C 128 128 118 135 100 135 C 82 135 72 128 70 110 Z" fill="#5d4037"/>
  <!-- Giant Eyes (Green iris, bloodshot veins optional but let's keep it clean) -->
  <circle cx="85" cy="88" r="15" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <circle cx="115" cy="88" r="15" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <circle cx="85" cy="88" r="7" fill="#8bc34a"/>
  <circle cx="115" cy="88" r="7" fill="#8bc34a"/>
  <circle cx="85" cy="88" r="3.5" fill="#111111"/>
  <circle cx="115" cy="88" r="3.5" fill="#111111"/>
  <!-- Nose (Big bulbous brown nose) -->
  <circle cx="100" cy="102" r="11" fill="#795548" stroke="#333333" stroke-width="1"/>
  <!-- Huge mouth (Wide grin, teeth showing) -->
  <path d="M 72 114 Q 100 138 128 114 Q 100 120 72 114 Z" fill="#333333" stroke="#333333" stroke-width="1.5"/>
  <!-- Teeth (goofy top/bottom) -->
  <rect x="88" y="116" width="6" height="5" fill="#ffffff"/>
  <rect x="106" y="116" width="6" height="5" fill="#ffffff"/>
  <!-- Bushy Uni-Brow -->
  <path d="M 68 76 Q 100 68 132 76" stroke="#3e2723" stroke-width="8" fill="none" stroke-linecap="round"/>
</svg>
