<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Red background -->
  <rect width="200" height="200" fill="#c0392b"/>
  <!-- Vignette top -->
  <radialGradient id="v" cx="50%" cy="0%" r="100%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.4)"/>
  </radialGradient>
  <rect width="200" height="200" fill="url(#v)"/>

  <!-- Mask shape (Dalí mask) -->
  <!-- Outer mask face -->
  <ellipse cx="100" cy="105" rx="62" ry="78" fill="#f0e8d0"/>
  <!-- Forehead brow ridge -->
  <ellipse cx="100" cy="65" rx="62" ry="38" fill="#f0e8d0"/>
  <!-- Cheek shadows -->
  <ellipse cx="70" cy="110" rx="20" ry="30" fill="#e8d8b8" opacity="0.5"/>
  <ellipse cx="130" cy="110" rx="20" ry="30" fill="#e8d8b8" opacity="0.5"/>

  <!-- Left eye socket - dark almond -->
  <ellipse cx="78" cy="97" rx="20" ry="14" fill="#1a1a1a"/>
  <ellipse cx="78" cy="97" rx="16" ry="10" fill="#111"/>
  <!-- Eyebrow left arch -->
  <path d="M 56 80 Q 78 68 100 80" stroke="#8B7355" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Right eye socket - dark almond -->
  <ellipse cx="122" cy="97" rx="20" ry="14" fill="#1a1a1a"/>
  <ellipse cx="122" cy="97" rx="16" ry="10" fill="#111"/>
  <!-- Eyebrow right arch -->
  <path d="M 100 80 Q 122 68 144 80" stroke="#8B7355" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Nose bridge -->
  <path d="M 95 108 L 90 128 Q 100 133 110 128 L 105 108 Z" fill="#ddd0b0" opacity="0.6"/>
  <!-- Nostrils -->
  <ellipse cx="91" cy="127" rx="5" ry="4" fill="#c8b890"/>
  <ellipse cx="109" cy="127" rx="5" ry="4" fill="#c8b890"/>

  <!-- Mouth - slight smile, Dalí style -->
  <path d="M 82 143 Q 100 155 118 143" stroke="#b8a080" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 82 143 Q 100 150 118 143 Q 110 148 100 149 Q 90 148 82 143 Z" fill="#e0c8a0" opacity="0.6"/>

  <!-- Dalí Mustache! Signature thin curled mustache -->
  <path d="M 82 136 Q 86 130 100 134 Q 114 130 118 136" stroke="#6B5835" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Mustache curl tips -->
  <path d="M 82 136 Q 76 130 74 122 Q 72 116 76 113" stroke="#6B5835" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 118 136 Q 124 130 126 122 Q 128 116 124 113" stroke="#6B5835" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Chin -->
  <ellipse cx="100" cy="172" rx="30" ry="14" fill="#e8d8b8"/>

  <!-- Mask outer border/texture lines -->
  <ellipse cx="100" cy="105" rx="62" ry="78" fill="none" stroke="#c8b890" stroke-width="1.5" opacity="0.6"/>
  <path d="M 62 70 Q 40 105 62 150" stroke="#c8b890" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M 138 70 Q 160 105 138 150" stroke="#c8b890" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Red hat hint at top -->
  <ellipse cx="100" cy="30" rx="55" ry="18" fill="#a93226"/>
  <rect x="45" y="14" width="110" height="24" rx="4" fill="#a93226"/>
  <rect x="30" y="30" width="140" height="8" rx="4" fill="#922b21"/>
</svg>
