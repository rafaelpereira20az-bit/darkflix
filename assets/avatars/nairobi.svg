<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#1abc9c"/>
  <circle cx="100" cy="100" r="95" fill="#a3e4d7" opacity="0.3"/>
  
  <!-- Red Jumpsuit -->
  <path d="M 55 200 L 68 150 L 132 150 L 145 200 Z" fill="#c0392b"/>
  <!-- Jumpsuit zipper -->
  <line x1="100" y1="150" x2="100" y2="200" stroke="#f1c40f" stroke-width="3"/>
  <rect x="98" y="160" width="4" height="10" fill="#ffffff" stroke="#7f8c8d" stroke-width="0.5"/>

  <!-- Neck -->
  <rect x="91" y="125" width="18" height="25" fill="#edd0be"/>
  
  <!-- Head -->
  <path d="M 74 110 C 68 82 75 66 100 66 C 125 66 132 82 126 110 C 122 126 114 130 100 130 C 86 130 78 126 74 110 Z" fill="#edd0be"/>
  
  <!-- Large Dark Eyes (Intense, determined) -->
  <ellipse cx="86" cy="95" rx="8" ry="5" fill="#111"/>
  <ellipse cx="114" cy="95" rx="8" ry="5" fill="#111"/>
  <circle cx="86" cy="95" r="4.5" fill="#4a2c11"/>
  <circle cx="114" cy="95" r="4.5" fill="#4a2c11"/>
  <circle cx="85" cy="93" r="1.5" fill="#fff"/>
  <circle cx="113" cy="93" r="1.5" fill="#fff"/>
  
  <!-- Strong thick eyebrows -->
  <path d="M 74 84 Q 86 78 96 84" stroke="#111" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 126 84 Q 114 78 104 84" stroke="#111" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Nose (Thin, long) -->
  <path d="M 100 90 L 97 108 L 102 108" fill="none" stroke="#b08b75" stroke-width="1.5"/>

  <!-- Lip line -->
  <path d="M 88 120 Q 100 126 112 120" stroke="#7e2a1f" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Gold Hoop Earrings -->
  <path d="M 68 112 Q 62 118 68 124" stroke="#f1c40f" stroke-width="2.5" fill="none"/>
  <path d="M 132 112 Q 138 118 132 124" stroke="#f1c40f" stroke-width="2.5" fill="none"/>

  <!-- Long Dark Wavy Hair -->
  <path d="M 72 70 Q 50 85 52 140 Q 48 170 54 170" stroke="#111" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 128 70 Q 150 85 148 140 Q 152 170 146 170" stroke="#111" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 70 70 Q 100 50 130 70 L 126 60 Q 100 48 74 60 Z" fill="#111"/>
</svg>
