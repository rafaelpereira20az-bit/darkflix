<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#ff7675"/>
  <circle cx="100" cy="100" r="90" fill="#ffeaa7" opacity="0.2"/>
  <!-- Pillow Shadow -->
  <rect x="44" y="44" width="112" height="112" rx="20" fill="#d63031" opacity="0.3"/>
  <!-- Pillow Body (White, puffy) -->
