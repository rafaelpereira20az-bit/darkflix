<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <radialGradient id="vintage-dark" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#3a4a3f"/>
    <stop offset="100%" stop-color="#141a16"/>
  </radialGradient>
  <rect width="200" height="200" fill="url(#vintage-dark)"/>
  
  <!-- Fur-trimmed coat collar -->
  <path d="M 50 200 L 68 150 L 132 150 L 150 200 Z" fill="#1e272e"/>
  <!-- Gold brooch -->
  <circle cx="100" cy="165" r="4" fill="#f1c40f"/>
  
  <!-- Neck -->
  <rect x="90" y="125" width="20" height="25" fill="#edd0be"/>
  
  <!-- Head -->
  <path d="M 74 110 C 68 82 75 66 100 66 C 125 66 132 82 126 110 C 122 126 114 130 100 130 C 86 130 78 126 74 110 Z" fill="#edd0be"/>
  
  <!-- Vintage Sunglasses (Round black frames, gold bridge) -->
  <circle cx="85" cy="95" r="13" fill="#111111" stroke="#f1c40f" stroke-width="1.5"/>
  <circle cx="115" cy="95" r="13" fill="#111111" stroke="#f1c40f" stroke-width="1.5"/>
  <line x1="98" y1="95" x2="102" y2="95" stroke="#f1c40f" stroke-width="2"/>
  
  <!-- Nose -->
  <path d="M 100 90 L 98 108 L 102 108" fill="none" stroke="#b08b75" stroke-width="1.5"/>

  <!-- Red Lipstick Lip line -->
  <path d="M 88 120 Q 100 128 112 120" stroke="#c0392b" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Dark Wavy Bob Hair -->
  <path d="M 72 70 Q 55 75 58 105 L 70 100 Z" fill="#2d3436"/>
  <path d="M 128 70 Q 145 75 142 105 L 130 100 Z" fill="#2d3436"/>
  <circle cx="58" cy="90" r="9" fill="#2d3436"/>
  <circle cx="142" cy="90" r="9" fill="#2d3436"/>

  <!-- Elegant black hat (fedora-style rim) -->
  <!-- Brim -->
  <path d="M 60 70 Q 100 60 140 70 L 145 75 Q 100 65 55 75 Z" fill="#111"/>
  <!-- Crown of hat -->
  <path d="M 72 66 C 72 45 80 40 100 40 C 120 40 128 45 128 66 Z" fill="#111"/>
  <!-- Gold hat band -->
  <path d="M 72 62 Q 100 56 128 62" stroke="#f1c40f" stroke-width="3.5" fill="none"/>
</svg>
