<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#e84393"/>
  <circle cx="100" cy="100" r="90" fill="#f8a5c2" opacity="0.3"/>
  <!-- Body/Clothes -->
  <path d="M 55 200 L 65 145 L 135 145 L 145 200 Z" fill="#8d6e63"/>
  <!-- Neck -->
  <rect x="90" y="125" width="20" height="25" fill="#2d3436"/>
  <!-- Head - Hooded -->
  <path d="M 70 120 C 60 120 55 90 60 70 C 65 50 80 45 100 45 C 120 45 135 50 140 70 C 145 90 140 120 130 120 Z" fill="#2d3436"/>
  <!-- Hood bottom flare -->
  <path d="M 60 120 Q 100 135 140 120 L 145 135 L 55 135 Z" fill="#2d3436"/>
  <!-- Eye Cutouts (Skin showing behind) -->
  <ellipse cx="82" cy="85" rx="14" ry="14" fill="#f0d2b4"/>
  <ellipse cx="118" cy="85" rx="14" ry="14" fill="#f0d2b4"/>
  <!-- Eyes inside cutouts -->
  <circle cx="82" cy="85" r="10" fill="#ffffff"/>
  <circle cx="118" cy="85" r="10" fill="#ffffff"/>
  <circle cx="82" cy="85" r="3.5" fill="#333333"/>
  <circle cx="118" cy="85" r="3.5" fill="#333333"/>
  <!-- Nose showing through or bump (We'll make a subtle nose contour) -->
  <path d="M 100 82 L 100 95" stroke="#1e272e" stroke-width="3" stroke-linecap="round"/>
  <!-- Mouth cutout/opening -->
  <path d="M 90 108 L 110 108 A 10 10 0 0 1 90 108 Z" fill="#f0d2b4"/>
  <path d="M 92 108 Q 100 112 108 108" stroke="#333333" stroke-width="1.5" fill="none"/>
</svg>
