<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Dark gothic purple background -->
  <rect width="200" height="200" fill="#1a0a2e"/>
  <!-- Subtle vignette -->
  <radialGradient id="bg" cx="50%" cy="100%" r="80%">
    <stop offset="0%" stop-color="#3d1060" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <rect width="200" height="200" fill="url(#bg)"/>

  <!-- Gothic window/arch pattern in background -->
  <path d="M 60 200 L 60 100 Q 60 70 100 70 Q 140 70 140 100 L 140 200" fill="none" stroke="#2d1548" stroke-width="20" opacity="0.5"/>

  <!-- Body - black dress -->
  <path d="M 55 200 L 62 148 Q 70 140 100 138 Q 130 140 138 148 L 145 200 Z" fill="#0f0f0f"/>
  <!-- Dress details -->
  <path d="M 80 148 L 80 200" stroke="#1a1a1a" stroke-width="1" opacity="0.6"/>
  <path d="M 100 138 L 100 200" stroke="#1a1a1a" stroke-width="1" opacity="0.6"/>
  <path d="M 120 148 L 120 200" stroke="#1a1a1a" stroke-width="1" opacity="0.6"/>
  <!-- White collar -->
  <path d="M 82 148 Q 100 158 118 148 L 114 138 Q 100 145 86 138 Z" fill="#e8e8e8"/>
  <!-- Collar detail buttons -->
  <circle cx="100" cy="150" r="3" fill="#ccc"/>
  <circle cx="100" cy="160" r="3" fill="#ccc"/>
  <circle cx="100" cy="170" r="3" fill="#ccc"/>

  <!-- Neck -->
  <rect x="88" y="128" width="24" height="16" rx="4" fill="#d4c0b0"/>

  <!-- Head - pale -->
  <ellipse cx="100" cy="100" rx="38" ry="44" fill="#d8c8b8"/>

  <!-- Hair - jet black, two braids framing face -->
  <!-- Top hair part -->
  <ellipse cx="100" cy="65" rx="38" ry="22" fill="#0a0a0a"/>
  <!-- Left braid -->
  <path d="M 64 75 Q 55 95 58 120 Q 60 140 62 155" stroke="#0a0a0a" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M 64 75 Q 55 95 58 120 Q 60 140 62 155" stroke="#1a1a1a" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="4,6" stroke-dashoffset="2"/>
  <!-- Right braid -->
  <path d="M 136 75 Q 145 95 142 120 Q 140 140 138 155" stroke="#0a0a0a" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M 136 75 Q 145 95 142 120 Q 140 140 138 155" stroke="#1a1a1a" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="4,6" stroke-dashoffset="2"/>
  <!-- Braid ties -->
  <circle cx="62" cy="155" r="4" fill="#5c1a5c"/>
  <circle cx="138" cy="155" r="4" fill="#5c1a5c"/>
  <!-- Hair center part line -->
  <path d="M 100 44 L 100 72" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Eyebrows - sharp, arched -->
  <path d="M 76 85 Q 86 80 96 85" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 104 85 Q 114 80 124 85" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Eyes - dark, intense -->
  <ellipse cx="86" cy="96" rx="10" ry="8" fill="white"/>
  <ellipse cx="114" cy="96" rx="10" ry="8" fill="white"/>
  <ellipse cx="86" cy="96" rx="7" ry="7" fill="#1a0a1a"/>
  <ellipse cx="114" cy="96" rx="7" ry="7" fill="#1a0a1a"/>
  <ellipse cx="86" cy="96" rx="4" ry="4" fill="#0a0010"/>
  <ellipse cx="114" cy="96" rx="4" ry="4" fill="#0a0010"/>
  <!-- Eye highlights -->
  <ellipse cx="88" cy="93" rx="2" ry="1.5" fill="white" opacity="0.8"/>
  <ellipse cx="116" cy="93" rx="2" ry="1.5" fill="white" opacity="0.8"/>
  <!-- Lower eyelid shadow -->
  <path d="M 76 100 Q 86 104 96 100" stroke="#c0a090" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 104 100 Q 114 104 124 100" stroke="#c0a090" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Nose - delicate -->
  <path d="M 98 106 Q 94 115 97 118 Q 100 120 103 118 Q 106 115 102 106" fill="none" stroke="#c0a890" stroke-width="1.5"/>
  <ellipse cx="96" cy="117" rx="3" ry="2" fill="#c0a890" opacity="0.5"/>
  <ellipse cx="104" cy="117" rx="3" ry="2" fill="#c0a890" opacity="0.5"/>

  <!-- Mouth - pursed, unimpressed -->
  <path d="M 88 126 Q 100 128 112 126" stroke="#8B5E52" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 90 126 Q 100 124 110 126" stroke="#a07068" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Ears -->
  <ellipse cx="62" cy="98" rx="6" ry="9" fill="#d8c8b8"/>
  <ellipse cx="138" cy="98" rx="6" ry="9" fill="#d8c8b8"/>
</svg>
