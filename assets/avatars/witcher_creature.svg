<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <radialGradient id="blood-bg" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#c0392b"/>
    <stop offset="100%" stop-color="#1e0808"/>
  </radialGradient>
  <rect width="200" height="200" fill="url(#blood-bg)"/>
  
  <!-- Creature shoulders/chest (Pale greyish blue skin) -->
  <path d="M 50 200 C 55 160 70 140 100 140 C 130 140 145 160 150 200 Z" fill="#4f5d65"/>
  <!-- Claws/Veins contour -->
  <path d="M 80 150 Q 100 170 120 150" stroke="#111" stroke-width="1.5" fill="none"/>

  <!-- Neck (Creepy tendons showing) -->
  <rect x="90" y="120" width="20" height="30" fill="#4f5d65"/>
  <line x1="93" y1="120" x2="93" y2="150" stroke="#2c3e50" stroke-width="2"/>
  <line x1="107" y1="120" x2="107" y2="150" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- Head (Asymmetrical, scary/distorted) -->
  <path d="M 70 105 C 60 75 75 55 100 55 C 125 55 138 75 128 105 C 124 122 118 128 100 128 C 82 128 72 122 70 105 Z" fill="#4f5d65"/>
  
  <!-- Decaying skin patches -->
  <path d="M 72 65 Q 82 60 80 75 Z" fill="#2c3e50" opacity="0.5"/>
  <path d="M 125 80 Q 115 85 118 95 Z" fill="#2c3e50" opacity="0.5"/>

  <!-- Glowing Yellow/Red Monster Eyes -->
  <ellipse cx="85" cy="85" rx="8" ry="5.5" fill="#111"/>
  <ellipse cx="115" cy="85" rx="8" ry="5.5" fill="#111"/>
  <circle cx="85" cy="85" r="4.5" fill="#f1c40f"/>
  <circle cx="115" cy="85" r="4.5" fill="#f1c40f"/>
  <circle cx="85" cy="85" r="2.5" fill="#e74c3c"/>
  <circle cx="115" cy="85" r="2.5" fill="#e74c3c"/>
  
  <!-- Nose (Deformed slits) -->
  <line x1="97" y1="98" x2="95" y2="104" stroke="#111" stroke-width="2.5"/>
  <line x1="103" y1="98" x2="105" y2="104" stroke="#111" stroke-width="2.5"/>

  <!-- Scary Mouth with Sharp Teeth -->
  <path d="M 78 114 Q 100 130 122 114 Q 100 112 78 114 Z" fill="#111111" stroke="#2c3e50" stroke-width="1"/>
  <!-- Top teeth -->
  <polygon points="85,114 88,120 91,114" fill="#ffffff"/>
  <polygon points="93,114 96,121 99,114" fill="#ffffff"/>
  <polygon points="101,114 104,121 107,114" fill="#ffffff"/>
  <polygon points="109,114 112,120 115,114" fill="#ffffff"/>
  <!-- Bottom teeth -->
  <polygon points="90,124 93,118 96,124" fill="#ffffff"/>
  <polygon points="98,125 101,118 104,125" fill="#ffffff"/>
  <polygon points="106,125 109,118 112,124" fill="#ffffff"/>
</svg>
